# Configuración SMTP - Gmail
# Para SpaceWork Sistema de Reservas

# Servidor SMTP de Gmail
smtp.host=smtp.gmail.com
smtp.port=587

# Credenciales Gmail
smtp.user=juancmduel@gmail.com
# IMPORTANTE: Esta es la contraseña de aplicación (16 caracteres) generada en Google
# NO es tu contraseña de Gmail regular
smtp.password=pwtt uaxp uifo vhiv

# Email remitente
smtp.from=juancmduel@gmail.com

# Autenticación y TLS
smtp.auth=true
smtp.starttls.enable=true
smtp.starttls.required=true

# Socket factory para seguridad
mail.smtp.socketFactory.port=587
mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
mail.smtp.socketFactory.fallback=false

# Configuración de timeouts (en ms)
smtp.connectiontimeout=5000
smtp.timeout=5000
smtp.writetimeout=5000

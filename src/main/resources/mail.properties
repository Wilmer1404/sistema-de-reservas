# ============================================================
#  CONFIGURACION DE CORREO - SpaceWork
#  Editar este archivo con tu cuenta Gmail antes de ejecutar
#  Ver CONFIGURACION_CORREO.md para instrucciones detalladas
# ============================================================

# Servidor SMTP (no cambiar si usas Gmail)
smtp.host=smtp.gmail.com
smtp.port=587

# TU cuenta Gmail
smtp.user=TU_CORREO@gmail.com

# Contrasena de APLICACION de Gmail (NO tu contrasena normal)
# Como obtenerla: CONFIGURACION_CORREO.md -> Paso 2
smtp.password=xxxx xxxx xxxx xxxx

# Remitente que aparecer en los correos
smtp.from=TU_CORREO@gmail.com

# Seguridad (no cambiar)
smtp.auth=true
smtp.starttls.enable=true
smtp.starttls.required=true
smtp.connectiontimeout=5000
smtp.timeout=5000
smtp.writetimeout=5000

server.port=8080
spring.application.name=SistemaReservas
spring.main.web-application-type=servlet

logging.level.root=INFO
logging.level.com.spacework=DEBUG

# Deshabilitar JPA/DataSource auto-config (usamos JDBC manual via Conexion.java)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.metrics.jdbc.DataSourcePoolMetricsAutoConfiguration

# Archivos estáticos (frontend SPA) - Servir en raíz
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Jackson: no incluir campos null en JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.fail-on-empty-beans=false

# ============================================
# SPRING BOOT ACTUATOR - ENDPOINTS DE MONITOREO
# ============================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

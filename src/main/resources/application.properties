server.port=8080
spring.application.name=SistemaReservas

logging.level.root=INFO
logging.level.com.spacework=DEBUG

# Deshabilitar JPA/DataSource auto-config (usamos JDBC manual via Conexion.java)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Archivos estáticos (frontend SPA)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Jackson: no incluir campos null en JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.fail-on-empty-beans=false

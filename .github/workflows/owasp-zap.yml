name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    name: Escaneo de Seguridad Dinámico (DAST)

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Construir la aplicación
        run: mvn -B -DskipTests package

      - name: Levantar la aplicación
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Esperar a que la aplicación esté lista
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080 >/dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 200 app.log || true
          exit 1

      - name: Preparar directorio de reportes ZAP
        run: mkdir -p ${{ github.workspace }}/zap-reports && chmod 777 ${{ github.workspace }}/zap-reports

      # Ejecutamos ZAP directamente como contenedor Docker para control total
      - name: Ejecutar OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -r report.html \
            -w report.md \
            -J report.json \
            -I
        continue-on-error: true

      - name: Verificar archivos de reporte
        if: always()
        run: ls -la ${{ github.workspace }}/zap-reports || true

      - name: Subir reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan
          path: ${{ github.workspace }}/zap-reports/
          if-no-files-found: warn

      - name: Apagar aplicación
        if: always()
        run: kill $(cat app.pid) || true

name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Escaneo de Seguridad Dinámico (DAST)
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      # En un entorno real, aquí se levanta la aplicación (ej. mvn spring-boot:run)
      # y luego ZAP ataca la URL local (ej. http://localhost:8080)
      
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080' # URL donde se desplegaría la app
          fail_action: false # Evita que falle el build si encuentra vulnerabilidades menores, solo reporta
          allow_issue_writing: true
